# ─────────────────────────────────────────────────────────────────
#  SonarCloud configuration for Docify
#  These are read both locally (mvn sonar:sonar) and in CI
# ─────────────────────────────────────────────────────────────────

sonar.projectKey=YOUR_SONAR_PROJECT_KEY
sonar.organization=YOUR_SONAR_ORGANIZATION
sonar.projectName=Docify - Collaborative Document Editor
sonar.projectVersion=1.0

# Source encoding
sonar.sourceEncoding=UTF-8

# Source & test directories
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# JaCoCo coverage report location
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions (auto-generated, config classes)
sonar.exclusions=\
  **/model/**,\
  **/*Application.java,\
  **/config/**

sonar.test.exclusions=**/*Test.java

# Language
sonar.language=java
sonar.java.source=17
