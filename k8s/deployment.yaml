# ─────────────────────────────────────────────────────────────────
#  Docify – Kubernetes Deployment (Staging)
#  Apply with: kubectl apply -f k8s/
# ─────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: Namespace
metadata:
  name: docify-staging

---
# ── ConfigMap – non-sensitive config ──────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: docify-config
  namespace: docify-staging
data:
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://docify-postgres:5432/docify"

---
# ── Secret – sensitive credentials (base64 encoded in real use) ───
apiVersion: v1
kind: Secret
metadata:
  name: docify-secrets
  namespace: docify-staging
type: Opaque
stringData:
  DB_USERNAME: postgres
  DB_PASSWORD: changeme-in-production

---
# ── PostgreSQL Deployment ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docify-postgres
  namespace: docify-staging
  labels:
    app: docify-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docify-postgres
  template:
    metadata:
      labels:
        app: docify-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: docify
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: docify-secrets
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docify-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# ── PostgreSQL Service ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: docify-postgres
  namespace: docify-staging
spec:
  selector:
    app: docify-postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# ── PersistentVolumeClaim for Postgres data ────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: docify-staging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ── Docify App Deployment ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docify-app
  namespace: docify-staging
  labels:
    app: docify
    version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: docify
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: docify
    spec:
      containers:
        - name: docify
          image: ghcr.io/YOUR_GITHUB_USERNAME/docify:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: docify-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: docify-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docify-secrets
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

---
# ── Docify App Service ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: docify-service
  namespace: docify-staging
spec:
  selector:
    app: docify
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
