# Server
server.port=8080

# PostgreSQL — reads from environment variables in production, falls back to local defaults
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/docify}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Siddhi123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Session
server.servlet.session.timeout=60m

# Static files
spring.web.resources.static-locations=classpath:/static/

# Gemini AI — set GEMINI_API_KEY as environment variable in production
gemini.api.key=${GEMINI_API_KEY:AIzaSyCalJAkGYgiPldLBowsS6hbIqyAOeVo_AA}
