<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Tasks — Docify</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--bg2:#e8e4de;--surface:rgba(255,255,255,0.85);
  --surface-solid:#ffffff;--glass:rgba(255,255,255,0.6);
  --glass-border:rgba(255,255,255,0.85);--border:rgba(0,0,0,0.07);
  --border2:rgba(0,0,0,0.12);--text-primary:#1a1814;
  --text-secondary:#6b6760;--text-muted:#a09d98;
  --accent:#1a1814;--accent-fg:#ffffff;
  --amber:#f4a547;--green:#4ecba0;--red:#e24b4a;--blue:#7b8cde;
  --sidebar-w:76px;--font:'Sora',sans-serif;
  --radius:16px;--radius-sm:10px;
  --shadow:0 4px 20px rgba(0,0,0,0.08);
  --shadow-md:0 8px 32px rgba(0,0,0,0.12);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text-primary);font-size:14px;overflow:hidden;}
body{display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--glass);backdrop-filter:blur(20px);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;padding:20px 0 24px;gap:2px;flex-shrink:0;}
.logo-mark{width:38px;height:38px;background:var(--accent);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin-bottom:28px;text-decoration:none;}
.nav-item{width:100%;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:14px;color:var(--text-muted);text-decoration:none;cursor:pointer;border:none;background:none;transition:all .2s;font-family:var(--font);}
.nav-item svg{width:19px;height:19px;}
.nav-item span{font-size:8px;font-weight:600;letter-spacing:.02em;}
.nav-item:hover{background:rgba(255,255,255,0.7);color:var(--text-primary);}
.nav-item.active{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(0,0,0,0.2);}
.nav-item.mt-auto{margin-top:auto;}
.sidebar-inner{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;width:100%;padding:0 10px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:24px 32px 16px;flex-shrink:0;}
.topbar-left h1{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.topbar-left p{font-size:12px;color:var(--text-muted);margin-top:3px;}
.topbar-right{display:flex;gap:8px;}
.filter-btn{padding:7px 14px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface-solid);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;color:var(--text-secondary);transition:all .15s;}
.filter-btn:hover,.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.back-btn{padding:7px 14px;border-radius:10px;border:1.5px solid var(--border2);background:var(--glass);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;color:var(--text-secondary);text-decoration:none;display:flex;align-items:center;gap:5px;}
.back-btn:hover{background:var(--surface-solid);}

/* KANBAN */
.kanban-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:0 32px 24px;display:flex;gap:20px;scroll-behavior:smooth;}
.kanban-wrap::-webkit-scrollbar{height:5px;}
.kanban-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

.kanban-col{flex-shrink:0;width:320px;display:flex;flex-direction:column;gap:0;}
.col-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface-solid);border-radius:var(--radius) var(--radius) 0 0;border:1px solid var(--border);border-bottom:none;margin-bottom:0;}
.col-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.col-dot{width:9px;height:9px;border-radius:50%;}
.col-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;background:var(--bg2);}
.col-body{flex:1;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:10px;display:flex;flex-direction:column;gap:10px;min-height:200px;max-height:calc(100vh - 180px);}
.col-body::-webkit-scrollbar{width:3px;}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* TASK CARD */
.task-card{background:var(--surface-solid);border-radius:12px;padding:14px;border:1px solid var(--border);transition:box-shadow .15s,transform .15s;cursor:pointer;}
.task-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.tc-title{font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.35;flex:1;}
.tc-doc-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;background:rgba(123,140,222,0.15);color:#4a5fa8;white-space:nowrap;flex-shrink:0;}
.tc-desc{font-size:11px;color:var(--text-secondary);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tc-meta{display:flex;flex-direction:column;gap:5px;}
.tc-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-secondary);}
.tc-row svg{width:12px;height:12px;flex-shrink:0;color:var(--text-muted);}
.tc-deadline{color:var(--amber);}
.tc-deadline.overdue{color:var(--red);}
.tc-assignees{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:8px;}
.tc-avatar{width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--surface-solid);}
.tc-owner-badge{font-size:9px;padding:2px 6px;border-radius:6px;background:rgba(78,203,160,0.15);color:#2d7a5f;font-weight:600;}
.tc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
.tc-toggle{font-size:10px;font-weight:700;padding:4px 10px;border-radius:7px;border:none;cursor:pointer;font-family:var(--font);transition:all .15s;}
.tc-toggle.complete{background:rgba(78,203,160,.15);color:#2d7a5f;}
.tc-toggle.complete:hover{background:rgba(78,203,160,.3);}
.tc-toggle.reopen{background:rgba(244,165,71,.12);color:#854F0B;}
.tc-toggle.reopen:hover{background:rgba(244,165,71,.25);}
.tc-doc-link{font-size:10px;color:var(--blue);text-decoration:none;font-weight:500;}
.tc-doc-link:hover{text-decoration:underline;}

.empty-col{font-size:12px;color:var(--text-muted);text-align:center;padding:32px 16px;}

/* LOADING */
.loading-state{display:flex;align-items:center;justify-content:center;height:200px;font-size:13px;color:var(--text-muted);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface-solid);border-radius:var(--radius);padding:28px;width:460px;max-width:95vw;box-shadow:var(--shadow-md);}
.modal-box h2{font-size:17px;font-weight:700;margin-bottom:16px;}
.modal-field{margin-bottom:12px;}
.modal-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);margin-bottom:4px;display:block;}
.modal-value{font-size:13px;color:var(--text-primary);line-height:1.5;}
.modal-close-btn{margin-top:16px;padding:8px 18px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg2);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;color:var(--text-secondary);}
.modal-close-btn:hover{background:var(--bg);color:var(--text-primary);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.kanban-col{animation:fadeUp .3s ease both;}
.kanban-col:nth-child(2){animation-delay:.05s;}
.kanban-col:nth-child(3){animation-delay:.1s;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <a href="/dashboard" class="logo-mark">D</a>
  <div class="sidebar-inner">
    <a href="/dashboard" class="nav-item" title="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span>Home</span>
    </a>
    <a href="/tasks" class="nav-item active" title="My Tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>Tasks</span>
    </a>
  </div>
  <button class="nav-item mt-auto" onclick="logout()" title="Logout">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    <span>Logout</span>
  </button>
</aside>

<!-- MAIN -->
<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <h1>My Tasks</h1>
      <p id="taskSubtitle">Loading your tasks…</p>
    </div>
    <div class="topbar-right">
      <button class="filter-btn active" id="filterAll" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" id="filterMine" onclick="setFilter('assigned',this)">Assigned to Me</button>
      <button class="filter-btn" id="filterCreated" onclick="setFilter('created',this)">Created by Me</button>
      <a href="/dashboard" class="back-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Dashboard
      </a>
    </div>
  </header>

  <!-- KANBAN -->
  <div class="kanban-wrap" id="kanbanWrap">
    <div class="loading-state">Loading tasks…</div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <h2 id="modalTitle">Task Detail</h2>
    <div id="modalBody"></div>
    <button class="modal-close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const AVATAR_COLORS = ['#f87c7c','#f4a547','#4ecba0','#7b8cde','#e07bbd','#5bc4d4','#b07cde','#a8d97f'];
let allTasks = [];
let filter   = 'all';
let myId     = null;

async function init() {
  const me = await fetch('/api/auth/me').then(r=>r.json());
  if (me.error) { window.location.href='/login'; return; }
  myId = me.id;

  await loadAll();
}

async function loadAll() {
  try {
    const [assigned, created] = await Promise.all([
      fetch('/api/tasks/my').then(r=>r.json()),
      fetch('/api/tasks/created-by-me').then(r=>r.json())
    ]);

    // Merge, deduplicate by id
    const map = {};
    (Array.isArray(assigned) ? assigned : []).forEach(t => { map[t.id] = {...t, _source:'assigned'}; });
    (Array.isArray(created)  ? created  : []).forEach(t => {
      if (map[t.id]) map[t.id]._source = 'both';
      else map[t.id] = {...t, _source:'created'};
    });
    allTasks = Object.values(map);

    const total = allTasks.length;
    document.getElementById('taskSubtitle').textContent =
      total === 0 ? 'No tasks yet.' : `${total} task${total>1?'s':''} across all documents`;

    render();
  } catch(e) {
    document.getElementById('kanbanWrap').innerHTML =
      '<div class="loading-state">Could not load tasks.</div>';
  }
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getFiltered() {
  if (filter === 'assigned') return allTasks.filter(t => t._source === 'assigned' || t._source === 'both');
  if (filter === 'created')  return allTasks.filter(t => t._source === 'created'  || t._source === 'both');
  return allTasks;
}

function render() {
  const tasks    = getFiltered();
  const pending  = tasks.filter(t => t.status !== 'COMPLETED');
  const done     = tasks.filter(t => t.status === 'COMPLETED');

  // Group pending by document
  const byDoc = {};
  pending.forEach(t => {
    if (!byDoc[t.documentId]) byDoc[t.documentId] = { title: t.documentTitle, tasks: [] };
    byDoc[t.documentId].tasks.push(t);
  });

  const wrap = document.getElementById('kanbanWrap');
  wrap.innerHTML = '';

  // Pending column per document
  if (Object.keys(byDoc).length === 0 && done.length === 0) {
    wrap.innerHTML = '<div class="loading-state">No tasks to show.</div>';
    return;
  }

  Object.values(byDoc).forEach(group => {
    wrap.appendChild(buildCol(group.title, group.tasks, '#f4a547', false));
  });

  // Completed column
  if (done.length > 0) {
    wrap.appendChild(buildCol('Completed', done, '#4ecba0', true));
  }
}

function buildCol(title, tasks, color, isDone) {
  const col = document.createElement('div');
  col.className = 'kanban-col';
  col.innerHTML = `
    <div class="col-header">
      <div class="col-title">
        <div class="col-dot" style="background:${color}"></div>
        ${esc(title)}
      </div>
      <span class="col-count">${tasks.length}</span>
    </div>
    <div class="col-body" id="col-body-${esc(title).replace(/\s/g,'-')}">
      ${tasks.length === 0 ? '<div class="empty-col">No tasks here</div>' :
        tasks.map(t => buildCard(t, isDone)).join('')}
    </div>`;
  return col;
}

function buildCard(t, isDone) {
  const due     = t.dueDate ? new Date(t.dueDate) : null;
  const overdue = due && due < new Date() && !isDone;
  const dueStr  = due ? due.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
  const assignees = Array.isArray(t.assignees) ? t.assignees : [];
  const avatars   = assignees.slice(0,5).map((a,i) =>
    `<div class="tc-avatar" style="background:${AVATAR_COLORS[i%AVATAR_COLORS.length]}" title="${esc(a.name||a.email)}">${(a.name||a.email)[0].toUpperCase()}</div>`
  ).join('') + (assignees.length > 5 ? `<div class="tc-avatar" style="background:var(--text-muted)">+${assignees.length-5}</div>` : '');

  const toggleBtn = isDone
    ? `<button class="tc-toggle reopen" onclick="event.stopPropagation();toggleStatus(${t.id},'PENDING')">↩ Reopen</button>`
    : `<button class="tc-toggle complete" onclick="event.stopPropagation();toggleStatus(${t.id},'COMPLETED')">✓ Done</button>`;

  return `<div class="task-card" onclick="openDetail(${t.id})">
    <div class="tc-top">
      <div class="tc-title">${esc(t.title)}</div>
      <div class="tc-doc-badge">${esc(t.documentTitle||'')}</div>
    </div>
    ${t.description ? `<div class="tc-desc">${esc(t.description)}</div>` : ''}
    <div class="tc-meta">
      <div class="tc-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span class="tc-deadline ${overdue?'overdue':''}">${overdue?'⚠ Overdue · ':''}${dueStr}</span>
      </div>
      ${t.createdByName ? `<div class="tc-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Owner: ${esc(t.createdByName)}</span>
      </div>` : ''}
    </div>
    ${assignees.length > 0 ? `<div class="tc-assignees">${avatars}</div>` : ''}
    <div class="tc-footer">
      ${toggleBtn}
      <a class="tc-doc-link" href="/editor/${t.documentId}" onclick="event.stopPropagation()">Open doc →</a>
    </div>
  </div>`;
}

function openDetail(taskId) {
  const t = allTasks.find(x => x.id === taskId);
  if (!t) return;
  const due = t.dueDate ? new Date(t.dueDate) : null;
  const overdue = due && due < new Date() && t.status !== 'COMPLETED';
  const assignees = Array.isArray(t.assignees) ? t.assignees : [];

  document.getElementById('modalTitle').textContent = t.title;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-field"><span class="modal-label">Document</span>
      <a href="/editor/${t.documentId}" class="modal-value" style="color:var(--blue);text-decoration:none">${esc(t.documentTitle||'')}</a>
    </div>
    ${t.description ? `<div class="modal-field"><span class="modal-label">Description</span><div class="modal-value">${esc(t.description)}</div></div>` : ''}
    <div class="modal-field"><span class="modal-label">Deadline</span>
      <div class="modal-value ${overdue?'tc-deadline overdue':''}">${due ? due.toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}) : 'No deadline'} ${overdue?'<span style="color:var(--red)">(Overdue)</span>':''}</div>
    </div>
    <div class="modal-field"><span class="modal-label">Owner</span>
      <div class="modal-value">${esc(t.createdByName||'Unknown')}</div>
    </div>
    <div class="modal-field"><span class="modal-label">Status</span>
      <div class="modal-value">
        <span style="padding:3px 10px;border-radius:7px;font-size:12px;font-weight:700;${t.status==='COMPLETED'?'background:rgba(78,203,160,.15);color:#2d7a5f':'background:rgba(244,165,71,.12);color:#854F0B'}">${t.status}</span>
      </div>
    </div>
    <div class="modal-field"><span class="modal-label">Assignees (${assignees.length})</span>
      <div style="display:flex;flex-direction:column;gap:5px;margin-top:4px">
        ${assignees.length === 0 ? '<span style="font-size:12px;color:var(--text-muted)">No assignees</span>' :
          assignees.map((a,i) => `<div style="display:flex;align-items:center;gap:8px;">
            <div class="tc-avatar" style="background:${AVATAR_COLORS[i%AVATAR_COLORS.length]};width:26px;height:26px;font-size:11px">${(a.name||a.email)[0].toUpperCase()}</div>
            <span style="font-size:12px;font-weight:500">${esc(a.name||a.email)}</span>
            <span style="font-size:10px;color:var(--text-muted)">${esc(a.email)}</span>
          </div>`).join('')}
      </div>
    </div>`;
  document.getElementById('detailModal').classList.add('open');
}

function closeModal() { document.getElementById('detailModal').classList.remove('open'); }

async function toggleStatus(taskId, newStatus) {
  await fetch('/api/tasks/'+taskId+'/status', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({status: newStatus})
  });
  await loadAll();
}

async function logout() {
  await fetch('/api/auth/logout', {method:'POST'});
  window.location.href = '/login';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
init();
</script>
</body>
</html>
