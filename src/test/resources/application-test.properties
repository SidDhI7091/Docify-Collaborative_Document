# ─────────────────────────────────────────────────────────────────
#  Test Profile – uses H2 in-memory database so tests run
#  without a real PostgreSQL instance (fast, isolated)
# ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:docify_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable security for tests (override in individual tests if needed)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Disable WebSocket auto-start in tests
spring.websocket.enabled=false
